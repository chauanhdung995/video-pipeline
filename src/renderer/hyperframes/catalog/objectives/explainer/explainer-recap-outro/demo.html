<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="video-pipeline-html" content="hyperframes-template-system-v1">
  <meta name="viewport" content="width=1080, height=1920">
  <title>Canh 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@500;600;700;800&family=Anton&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
:root{--vp-stage-w:1080px;--vp-stage-h:1920px;--vp-bg-top:#08111f;--vp-bg-bottom:#15243a;--vp-accent:#22d3ee;--vp-mint:#34d399}
/* ============================================================
   v2 VISUAL SYSTEM — Vietnamese News Short Video 9:16 (1080×1920)
   Dark Navy + Cyan + Purple palette — HeyGen-quality professional look
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@500;600;700;800&family=Anton&family=Bebas+Neue&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px; height: 1920px; overflow: hidden; background: #0a1628;
  font-family: 'Inter', 'Noto Sans', sans-serif;
}

#stage { position: relative; width: 1080px; height: 1920px; }

/* Default invisible — GSAP timeline sets opacity:1 at scene start, opacity:0 at end. */
.scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }

/* ── PERSISTENT SHELL BACKGROUND ───────────────────────────── */
.shell-bg {
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(180deg, #0a1628 0%, #1e2a47 100%);
}

/* ── GRAIN OVERLAY (from grain-overlay component) ───────────── */
@keyframes hf-grain-noise {
  0%,100% { transform: translate(0,0); }
  10%  { transform: translate(-5%,-5%); }
  20%  { transform: translate(-10%,5%); }
  30%  { transform: translate(5%,-10%); }
  40%  { transform: translate(-5%,15%); }
  50%  { transform: translate(-10%,5%); }
  60%  { transform: translate(15%,0); }
  70%  { transform: translate(0,10%); }
  80%  { transform: translate(-15%,0); }
  90%  { transform: translate(10%,5%); }
}

#grain-overlay .grain-texture {
  position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity: 0.12;
  animation: hf-grain-noise 0.5s steps(1) infinite;
}

/* ── BRAND SHELL HEADER (top-left persistent) ───────────────── */
.brand-shell-header {
  position: absolute; top: 60px; left: 60px;
  display: flex; align-items: center; gap: 28px;
  z-index: 50;
}

.brand-icon {
  width: 90px; height: 90px;
  background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace;
  font-size: 32px; font-weight: 700; color: #fff;
  letter-spacing: -0.05em;
  box-shadow: 0 4px 24px rgba(124,58,237,0.5);
  flex-shrink: 0;
}

.brand-text {
  display: flex; flex-direction: column; gap: 6px;
}

.brand-name {
  font-family: 'Inter', sans-serif;
  font-size: 40px; font-weight: 700; color: #fff;
  line-height: 1.1; letter-spacing: -0.01em;
}

.brand-tag {
  font-family: 'Inter', sans-serif;
  font-size: 24px; font-weight: 500;
  color: #22d3ee;
  letter-spacing: 4px; text-transform: uppercase;
}

/* ── BRAND SHELL FOOTER HANDLE (bottom-right) ───────────────── */
.brand-shell-handle {
  position: absolute; bottom: 200px; right: 60px;
  display: flex; align-items: center; gap: 14px;
  background: rgba(15,23,42,0.75);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  padding: 16px 32px;
  z-index: 50;
}

.handle-music {
  font-size: 30px; color: #fff;
}

.handle-text {
  font-family: 'Inter', sans-serif;
  font-size: 30px; font-weight: 600; color: #fff;
  letter-spacing: -0.01em;
}

/* ── BRAND SHELL KEYWORD PILL (bottom-center) ───────────────── */
.brand-shell-keyword {
  position: absolute; bottom: 130px; left: 50%;
  transform: translateX(-50%);
  background: rgba(34,211,238,0.15);
  border: 1px solid rgba(34,211,238,0.4);
  border-radius: 50px;
  padding: 12px 36px;
  z-index: 50;
}

.brand-shell-keyword span {
  font-family: 'Inter', sans-serif;
  font-size: 26px; font-weight: 500;
  color: #22d3ee; letter-spacing: 2px;
}

/* ── BACKGROUND PRIMITIVES ─────────────────────────────────── */
.bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 1; }

/* Ken Burns */
.bg.kb-zoom-in    { animation: kb-zoom-in    var(--scene-dur) linear forwards; }
.bg.kb-zoom-out   { animation: kb-zoom-out   var(--scene-dur) linear forwards; }
.bg.kb-pan-left   { animation: kb-pan-left   var(--scene-dur) linear forwards; }
.bg.kb-pan-right  { animation: kb-pan-right  var(--scene-dur) linear forwards; }

@keyframes kb-zoom-in   { from { transform: scale(1.0); } to { transform: scale(1.18); } }
@keyframes kb-zoom-out  { from { transform: scale(1.18); } to { transform: scale(1.0); } }
@keyframes kb-pan-left  { from { transform: scale(1.15) translateX(4%); } to { transform: scale(1.15) translateX(-4%); } }
@keyframes kb-pan-right { from { transform: scale(1.15) translateX(-4%); } to { transform: scale(1.15) translateX(4%); } }

/* Gradient backgrounds */
.bg.gradient-news-dark { background: linear-gradient(135deg, #0a1628 0%, #1e2a47 100%); }
.bg.gradient-outro-purple { background: linear-gradient(135deg, #4c1d95 0%, #1e3a5f 100%); }

/* Overlay (hook image darkening) */
.overlay { position: absolute; inset: 0; background: #000; z-index: 2; }

/* ── SHIMMER SWEEP (from shimmer-sweep component) ───────────── */
.shimmer-sweep-target {
  position: relative;
  display: inline-block;
}

.shimmer-sweep-target .shimmer-mask {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  background: linear-gradient(
    var(--shimmer-angle, 120deg),
    transparent 0%,
    transparent calc(var(--shimmer-pos, -20%) - var(--shimmer-width, 20%) / 2),
    var(--shimmer-color, rgba(255,255,255,0.6)) var(--shimmer-pos, -20%),
    transparent calc(var(--shimmer-pos, -20%) + var(--shimmer-width, 20%) / 2),
    transparent 100%
  );
  mix-blend-mode: overlay;
}

/* ── CARD GLASS MIXIN ────────────────────────────────────────── */
/* Used by comparison, feature-list, callout */
.glass-card {
  background: rgba(15,23,42,0.65);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 24px;
}

/* ── LAYOUT: HOOK ────────────────────────────────────────────── */
.layout-hook {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 200px 80px 300px;
  text-align: center;
}

.hook-headline {
  font-family: 'Anton', 'Inter', sans-serif;
  font-size: 160px; font-weight: 900;
  color: #fff; line-height: 1.0;
  text-align: center; letter-spacing: -0.02em;
  text-shadow: 0 4px 40px rgba(0,0,0,0.8);
  display: block; width: 100%;
  opacity: 0;
}

.hook-subhead {
  font-family: 'Inter', sans-serif;
  font-size: 80px; font-weight: 800;
  color: #22d3ee; line-height: 1.1;
  text-align: center;
  text-shadow: 0 0 40px rgba(34,211,238,0.5);
  margin-top: 32px;
  opacity: 0;
}

/* ── LAYOUT: COMPARISON ──────────────────────────────────────── */
.layout-comparison {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 220px 80px 300px;
  gap: 0;
}

.cmp-card {
  width: 100%;
  background: rgba(15,23,42,0.65);
  border-radius: 24px;
  padding: 60px 70px;
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 20px;
  opacity: 0;
}

.cmp-card.color-cyan  { border: 2px solid #22d3ee; box-shadow: 0 0 40px rgba(34,211,238,0.25); }
.cmp-card.color-purple { border: 2px solid #a855f7; box-shadow: 0 0 40px rgba(168,85,247,0.25); }
.cmp-card.card-winner  { border-width: 3px; }

.cmp-label {
  font-family: 'Inter', sans-serif;
  font-size: 40px; font-weight: 500;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase; letter-spacing: 3px;
}

.cmp-value {
  font-family: 'Anton', 'Inter', sans-serif;
  font-size: 110px; font-weight: 900;
  color: #fff; line-height: 1.0;
  letter-spacing: -0.02em;
}

.cmp-card.color-cyan  .cmp-value { color: #22d3ee; }
.cmp-card.color-purple .cmp-value { color: #a855f7; }

.cmp-winner-badge {
  font-family: 'Inter', sans-serif;
  font-size: 28px; font-weight: 700;
  color: #22d3ee;
  background: rgba(34,211,238,0.15);
  border: 1px solid rgba(34,211,238,0.4);
  border-radius: 50px;
  padding: 8px 24px;
  letter-spacing: 3px; text-transform: uppercase;
}

.cmp-vs {
  font-family: 'Anton', 'Inter', sans-serif;
  font-size: 80px; font-weight: 900;
  color: rgba(255,255,255,0.35);
  text-align: center; line-height: 1;
  margin: 32px 0;
  opacity: 0;
}

/* ── LAYOUT: STAT HERO ───────────────────────────────────────── */
.layout-stat-hero {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 220px 80px 300px;
  text-align: center; gap: 24px;
}

.stat-value {
  font-family: 'Anton', 'Bebas Neue', sans-serif;
  font-size: 220px; font-weight: 900;
  color: #22d3ee; line-height: 1.0;
  letter-spacing: -0.02em;
  text-shadow: 0 0 80px rgba(34,211,238,0.5);
  display: block;
  opacity: 0;
}

.stat-label {
  font-family: 'Inter', sans-serif;
  font-size: 64px; font-weight: 700;
  color: #fff; line-height: 1.2;
  text-align: center;
  opacity: 0;
}

.stat-context {
  font-family: 'Inter', sans-serif;
  font-size: 44px; font-weight: 500;
  color: rgba(255,255,255,0.6);
  text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  padding: 16px 48px;
  opacity: 0;
}

/* ── LAYOUT: FEATURE LIST ────────────────────────────────────── */
.layout-feature-list {
  position: absolute; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  padding: 220px 80px 300px;
}

.feat-card {
  width: 100%;
  background: rgba(15,23,42,0.65);
  border: 2px solid rgba(124,58,237,0.5);
  border-radius: 24px;
  padding: 72px 80px;
  box-shadow: 0 0 60px rgba(124,58,237,0.2);
  opacity: 0;
}

.feat-title {
  font-family: 'Inter', sans-serif;
  font-size: 60px; font-weight: 700;
  color: #a855f7; line-height: 1.2;
  margin-bottom: 0;
}

.feat-rule {
  height: 3px;
  background: linear-gradient(90deg, #a855f7, transparent);
  margin: 40px 0;
  transform-origin: left center;
  opacity: 0;
}

.feat-bullets {
  display: flex; flex-direction: column; gap: 36px;
}

.feat-bullet {
  display: flex; align-items: center; gap: 32px;
  opacity: 0;
}

.feat-dot {
  width: 20px; height: 20px; flex-shrink: 0;
  background: #22d3ee;
  border-radius: 50%;
  box-shadow: 0 0 16px rgba(34,211,238,0.6);
}

.feat-text {
  font-family: 'Inter', sans-serif;
  font-size: 50px; font-weight: 500;
  color: rgba(255,255,255,0.9); line-height: 1.3;
}

/* ── LAYOUT: CALLOUT ─────────────────────────────────────────── */
.layout-callout {
  position: absolute; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  padding: 220px 80px 300px;
}

.callout-card {
  width: 100%;
  background: rgba(15,23,42,0.65);
  border: 2px solid rgba(34,211,238,0.5);
  border-radius: 24px;
  padding: 80px;
  box-shadow: 0 0 60px rgba(34,211,238,0.2);
  text-align: center;
  opacity: 0;
}

.callout-tag {
  display: inline-block;
  font-family: 'Inter', sans-serif;
  font-size: 32px; font-weight: 700;
  color: #22d3ee;
  background: rgba(34,211,238,0.12);
  border: 1px solid rgba(34,211,238,0.4);
  border-radius: 50px;
  padding: 12px 36px;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 48px;
}

.callout-statement {
  font-family: 'Inter', sans-serif;
  font-size: 64px; font-weight: 600;
  color: #fff; line-height: 1.35;
}

/* ── LAYOUT: OUTRO ───────────────────────────────────────────── */
.layout-outro {
  position: absolute; inset: 0; z-index: 5;
  background: linear-gradient(180deg, rgba(76,29,149,0.6) 0%, rgba(10,22,40,0.8) 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 220px 80px 300px;
  gap: 0;
  text-align: center;
}

.out-cta-top {
  font-family: 'Inter', sans-serif;
  font-size: 52px; font-weight: 700; color: #fff;
  border: 3px solid rgba(255,255,255,0.7);
  padding: 20px 56px; border-radius: 50px;
  letter-spacing: 0.05em; margin-bottom: 80px;
  opacity: 0;
}

.out-channel {
  font-family: 'Anton', 'Inter', sans-serif;
  font-size: 120px; font-weight: 900;
  color: #fff; text-align: center;
  line-height: 1.0; letter-spacing: -0.02em;
  text-shadow: 0 0 60px rgba(168,85,247,0.6);
  opacity: 0;
}

.out-underline {
  height: 4px;
  background: linear-gradient(90deg, #7c3aed, #22d3ee);
  width: 0; margin: 40px auto;
  border-radius: 4px;
}

.out-source {
  font-family: 'Inter', sans-serif;
  font-size: 44px; font-weight: 500;
  color: rgba(255,255,255,0.65); text-align: center;
  margin-top: 40px;
  opacity: 0;
}

/* ── FX OVERLAYS ────────────────────────────────────────────── */
.fx { position: absolute; inset: 0; pointer-events: none; opacity: 0; z-index: 10; }
.fx.flash-white-3f     { background: #fff; }
.fx.particle-burst     { background: radial-gradient(circle at center, rgba(34,211,238,0.9) 0%, transparent 60%); }
.fx.color-flash-accent { background: rgba(168,85,247,0.4); }

/* ── TIKTOK FOLLOW CARD (outro overlay) ──────────────────────────────────
   Adapted from HyperFrames hyperframes:block tiktok-follow.
   Card slides up from bottom during outro scene. */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=block');

.tt-card {
  position: absolute;
  bottom: 360px;            /* above the brand-shell-handle */
  left: 50%;
  transform: translate(-50%, 300px);   /* start off-screen below */
  display: flex; align-items: center; gap: 30px;
  background: #1a1a1a;
  border-radius: 75px;
  padding: 25px 40px 25px 25px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(254,44,85,0.15);
  font-family: 'DM Sans', sans-serif;
  opacity: 0;
  z-index: 60;
}

.tt-avatar {
  width: 120px; height: 120px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  border: 3px solid #333;
}

.tt-profile-info {
  display: flex; flex-direction: column; gap: 2px;
  margin-right: 20px;
}

.tt-display-name {
  font-size: 42px; font-weight: 700; color: #ffffff;
  line-height: 1.3; letter-spacing: -0.01em;
}
.tt-handle {
  font-size: 28px; font-weight: 400; color: #a0a0a0;
  line-height: 1.3;
}
.tt-followers {
  font-size: 25px; font-weight: 400; color: #737373;
  line-height: 1.3;
}

.tt-follow-btn {
  position: relative;
  width: 250px; height: 80px;
  border-radius: 40px;
  background: #fe2c55;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

.tt-btn-text {
  position: absolute;
  font-family: 'DM Sans', sans-serif;
  font-size: 30px; font-weight: 700; color: #ffffff;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.tt-btn-text-following {
  opacity: 0;
  display: flex; align-items: center; gap: 8px;
}

.tt-check-icon { display: inline-block; width: 22px; height: 22px; }
.tt-check-icon svg { width: 22px; height: 22px; display: block; }

/* ============================================================
   Video Pipeline extensions — visual-schema driven templates
   ============================================================ */

:root {
  --vp-bg-top: #111827;
  --vp-bg-bottom: #2563eb;
  --vp-accent: #06b6d4;
  --vp-mint: #22c55e;
}

html, body { width: var(--vp-stage-w, 1080px); height: var(--vp-stage-h, 1920px); }
#stage {
  width: var(--vp-stage-w, 1080px);
  height: var(--vp-stage-h, 1920px);
  overflow: hidden;
  background: var(--vp-bg-top);
}

.brand-shell-header {
  top: 36px;
  left: 36px;
  gap: 16px;
  transform: scale(.72);
  transform-origin: top left;
  opacity: .78;
}
.brand-shell-keyword { bottom: 78px; opacity: .72; }

/* Project renders one scene per HTML file, so scenes must be visible even
   when HyperFrames does not seek the source GSAP timeline. */
.scene { opacity: 1; --scene-dur: 8s; }
.scene * { box-sizing: border-box; }

@keyframes vp-rise { from { opacity: 0; transform: translateY(70px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes vp-drop { from { opacity: 0; transform: translateY(-45px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes vp-pop { from { opacity: 0; transform: scale(.46); } to { opacity: 1; transform: scale(1); } }
@keyframes vp-left { from { opacity: 0; transform: translateX(-90px); } to { opacity: 1; transform: translateX(0); } }
@keyframes vp-right { from { opacity: 0; transform: translateX(90px); } to { opacity: 1; transform: translateX(0); } }
@keyframes vp-sweep { from { transform: translateX(-140%) skewX(-12deg); } to { transform: translateX(150%) skewX(-12deg); } }
@keyframes vp-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
@keyframes vp-halo { from { opacity: 0; transform: translate(-50%,-50%) rotate(0deg) scale(.88); } to { opacity: .9; transform: translate(-50%,-50%) rotate(360deg) scale(1); } }
@keyframes vp-chart-draw { from { stroke-dashoffset: 1200; } to { stroke-dashoffset: 0; } }
@keyframes vp-pulse { 0%,100% { opacity: .42; transform: scale(1); } 50% { opacity: .9; transform: scale(1.08); } }

.hf-anim,
.vp-anim {
  opacity: 0;
  will-change: transform, opacity;
  animation-name: var(--vp-effect, vp-rise);
  animation-duration: var(--vp-dur, .62s);
  animation-timing-function: cubic-bezier(.19,1,.22,1);
  animation-delay: var(--vp-delay, 0s);
  animation-fill-mode: both;
}

.vp-bg {
  position: absolute;
  inset: 0;
  z-index: 1;
  background-image:
    var(--vp-bg-image, none),
    radial-gradient(circle at 25% 18%, rgba(6,182,212,.28), transparent 28%),
    radial-gradient(circle at 72% 78%, rgba(34,197,94,.18), transparent 25%),
    linear-gradient(180deg, var(--vp-bg-top), var(--vp-bg-bottom));
  background-size:
    var(--vp-bg-fit, cover),
    auto,
    auto,
    auto;
  background-position: center;
  background-repeat: no-repeat;
}

.vp-bg-pattern {
  position: absolute;
  inset: 0;
  z-index: 2;
  opacity: var(--vp-pattern-opacity, .18);
  background-image:
    linear-gradient(120deg, transparent 0 44%, rgba(6,182,212,.55) 45% 46%, transparent 47%),
    linear-gradient(60deg, transparent 0 47%, rgba(6,182,212,.32) 48% 49%, transparent 50%),
    radial-gradient(circle, rgba(34,197,94,.7) 0 2px, transparent 3px);
  background-size: 210px 150px, 180px 220px, 140px 140px;
}

.vp-shell {
  position: absolute;
  inset: 0;
  z-index: 5;
  color: #fff;
  font-family: 'Inter', sans-serif;
}

.vp-title {
  position: absolute;
  left: 70px;
  right: 70px;
  top: 120px;
  z-index: 20;
  text-align: center;
  font-size: 66px;
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: .02em;
  text-transform: uppercase;
  text-shadow: 0 10px 44px rgba(0,0,0,.35);
}

@keyframes vp-photo-kenburns {
  from { transform: scale(1.04) translate3d(-1.5%, 1%, 0); }
  to { transform: scale(1.18) translate3d(1.5%, -1%, 0); }
}

.vp-photo-bg {
  position: absolute;
  inset: 0;
  z-index: 1;
  overflow: hidden;
  background: linear-gradient(180deg, var(--vp-bg-top), var(--vp-bg-bottom));
}

.vp-photo-bg-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  animation: vp-photo-kenburns var(--scene-dur, 8s) linear forwards;
  filter: saturate(1.08) contrast(1.05);

/* ============================================================
   Breaking News objective templates
   ============================================================ */

@keyframes bn-scan {
  from { transform: translateY(-100%); }
  to { transform: translateY(100%); }
}

@keyframes bn-ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

@keyframes bn-pin-pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .82; }
  50% { transform: translate(-50%, -50%) scale(1.18); opacity: 1; }
}

@keyframes bn-bg-drift {
  0% { background-position: 0% 0%, 50% 50%; filter: saturate(1); }
  100% { background-position: 7% 4%, 50% 50%; filter: saturate(1.08); }
}

@keyframes bn-grid-drift {
  from { transform: translate3d(0, 0, 0); }
  to { transform: translate3d(36px, 28px, 0); }
}

@keyframes bn-alert-pulse {
  0%, 100% { opacity: .82; box-shadow: 0 0 44px rgba(239,68,68,.48); }
  50% { opacity: 1; box-shadow: 0 0 68px rgba(239,68,68,.68); }
}

@keyframes bn-line-glide {
  0%, 100% { opacity: .58; transform: translateX(-10px) scaleX(.94); }
  50% { opacity: .95; transform: translateX(18px) scaleX(1); }
}

@keyframes bn-idle-float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-7px) scale(1.006); }
}

.scene-template-news-alert-opener .vp-anim,
.scene-template-issue-comparison .vp-anim,
.scene-template-news-bullet-list .vp-anim,
.scene-template-event-timeline .vp-anim,
.scene-template-quote-card .vp-anim,
.scene-template-visual-evidence .vp-anim,
.scene-template-key-number .vp-anim,
.scene-template-follow-outro .vp-anim,

.scene-template-source-check .vp-anim,
.scene-template-live-update-ticker .vp-anim,
.scene-template-location-context .vp-anim {
  animation-name: var(--vp-effect, vp-rise), bn-idle-float;
  animation-duration: var(--vp-dur, .62s), var(--bn-idle-dur, 4.8s);

  animation-delay: var(--vp-delay, 0s), calc(var(--vp-delay, 0s) + var(--vp-dur, .62s) + .2s);

  animation-iteration-count: 1, infinite;
}

/* ============================================================
   Explainer objective templates
   ============================================================ */

@keyframes ex-grid-drift {
  from { transform: translate3d(0, 0, 0); }
  to { transform: translate3d(42px, 42px, 0); }
}

@keyframes ex-line-draw {
  from { stroke-dashoffset: 1200; }
  to { stroke-dashoffset: 0; }
}

@keyframes ex-ambient-flow {
  0% { transform: translate3d(-18%, -5%, 0) skewX(-10deg); opacity: .18; }
  50% { transform: translate3d(6%, 3%, 0) skewX(-10deg); opacity: .32; }
  100% { transform: translate3d(22%, -2%, 0) skewX(-10deg); opacity: .18; }
}

@keyframes ex-scan-drift {
  from { background-position: 0 0, 0 0; }
  to { background-position: 0 92px, 128px 0; }
}

@keyframes ex-sheen-pass {
  from { transform: translate3d(-140%, 0, 0) skewX(-18deg); }
  to { transform: translate3d(170%, 0, 0) skewX(-18deg); }
}

@keyframes ex-soft-border {
  0%, 100% { box-shadow: 0 30px 90px rgba(0,0,0,.32), inset 0 0 0 1px rgba(248,250,252,.02); }
  50% { box-shadow: 0 34px 100px rgba(34,211,238,.13), inset 0 0 0 1px rgba(34,211,238,.15); }
}

@keyframes ex-marker-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(34,211,238,.34); }
  50% { box-shadow: 0 0 0 9px rgba(34,211,238,0); }
}

@keyframes ex-lens-breathe {
  0%, 100% { box-shadow: 0 0 0 10px rgba(34,211,238,.42), 0 28px 80px rgba(0,0,0,.44); }
  50% { box-shadow: 0 0 0 18px rgba(34,211,238,.18), 0 34px 96px rgba(34,211,238,.18); }
}

@keyframes ex-photo-haze {
  from { transform: translate3d(-16%, -10%, 0) rotate(-4deg); opacity: .18; }
  50% { transform: translate3d(4%, 2%, 0) rotate(-4deg); opacity: .34; }
  to { transform: translate3d(18%, -4%, 0) rotate(-4deg); opacity: .18; }
}

@keyframes ex-media-drift {
  from { transform: scale(1.02) translate3d(-.8%, .5%, 0); }
  to { transform: scale(1.055) translate3d(.8%, -.5%, 0); }
}

.ex-bg {
  position: absolute;
  inset: 0;
  z-index: 1;
  overflow: hidden;
  background:
    linear-gradient(145deg, rgba(34,211,238,.15) 0 17%, transparent 17% 100%),
    linear-gradient(205deg, transparent 0 70%, rgba(245,158,11,.16) 70% 100%),
    linear-gradient(180deg, #08111f 0%, #0e1c2d 48%, #15243a 100%);
}

.ex-bg::before,
.ex-bg::after {
  content: "";
  position: absolute;
  inset: -20%;

}

.ex-bg::before {

     data-layout="explainer-recap-outro"
     style="--scene-dur:5.000s;--vp-bg-top:#08111f;--vp-bg-bottom:#15243a;--vp-accent:#22d3ee;--vp-mint:#34d399;--vp-pattern-opacity:0.16;--vp-bg-image:none;--vp-bg-fit:cover">

<div class="ex-recap">

  <script>
// v2 Animation Engine — template-specific entrance animations
// HyperFrames runtime drives playback by seeking the timeline.
//
// IMPORTANT: Only use supported GSAP props: opacity, x, y, scale, scaleX, scaleY, rotation, width, height, visibility.
// Do NOT use `delay:` in vars — use position parameter (3rd arg) instead.
// Do NOT use `attr:` settings. No complex easings.

window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });
window.__timelines["scene-1"] = tl;

(function () {
  // ── Inject shimmer masks into all .shimmer-sweep-target elements ──────────
  document.querySelectorAll(".shimmer-sweep-target").forEach((el) => {
    if (!el.querySelector(".shimmer-mask")) {
      const mask = document.createElement("div");
      mask.className = "shimmer-mask";
      el.appendChild(mask);
    }
  });

  const stage = document.getElementById("stage");
  const scenes = Array.from(stage.querySelectorAll(".scene"));

  // ── Scene dispatch ──────────────────────────────────────────────────────
  scenes.forEach((scene) => {
    const start = parseFloat(scene.dataset.start);
    const dur   = parseFloat(scene.dataset.duration);
    const layout = scene.dataset.layout;

    // Scene visibility: fade in/out
    tl.set(scene, { opacity: 1 }, start);
    tl.set(scene, { opacity: 0 }, start + dur);

    if (layout === "hook") {
      animateHook(scene, tl, start);
    } else if (layout === "comparison") {
      animateComparison(scene, tl, start);
    } else if (layout === "stat-hero") {
      animateStatHero(scene, tl, start);
    } else if (layout === "feature-list") {
      animateFeatureList(scene, tl, start);
    } else if (layout === "callout") {
      animateCallout(scene, tl, start);
    } else if (layout === "outro") {
      animateOutro(scene, tl, start, dur);
    }
  });

  // ── HOOK ──────────────────────────────────────────────────────────────
  function animateHook(scene, tl, start) {
    const headline = scene.querySelector(".hook-headline");
    if (headline) {
      // Scale pop in
      tl.fromTo(headline, { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6 }, start + 0.15);
      // Shimmer sweep after entrance
      const mask = headline.querySelector(".shimmer-mask");
      if (mask) {
        tl.fromTo(mask, { x: "-120%" }, { x: "120%", duration: 1.0 }, start + 0.7);
      }
    }

    const subhead = scene.querySelector(".hook-subhead");
    if (subhead) {
      tl.fromTo(subhead, { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, start + 0.55);
    }
  }

  // ── COMPARISON ────────────────────────────────────────────────────────
  function animateComparison(scene, tl, start) {
    const leftCard = scene.querySelector(".cmp-left");
    if (leftCard) {
      tl.fromTo(leftCard, { x: -80, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5 }, start + 0.15);
    }

    const vs = scene.querySelector(".cmp-vs");
    if (vs) {
      tl.fromTo(vs, { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.35 }, start + 0.45);
    }

    const rightCard = scene.querySelector(".cmp-right");
    if (rightCard) {
      tl.fromTo(rightCard, { x: 80, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5 }, start + 0.6);
    }
  }

  // ── STAT HERO ─────────────────────────────────────────────────────────
  function animateStatHero(scene, tl, start) {
    const value = scene.querySelector(".stat-value");
    if (value) {
      tl.fromTo(value, { scale: 0.4, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6 }, start + 0.15);
      // Shimmer sweep on the stat value
      const mask = value.querySelector(".shimmer-mask");
      if (mask) {
        tl.fromTo(mask, { x: "-120%" }, { x: "120%", duration: 1.0 }, start + 0.7);
      }
    }

    const label = scene.querySelector(".stat-label");
    if (label) {
      tl.fromTo(label, { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.45 }, start + 0.55);
    }

    const context = scene.querySelector(".stat-context");
    if (context) {
      tl.fromTo(context, { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4 }, start + 0.85);
    }
  }

  // ── FEATURE LIST ──────────────────────────────────────────────────────
  function animateFeatureList(scene, tl, start) {
    const card = scene.querySelector(".feat-card");
    if (card) {
      tl.fromTo(card, { y: 60, scale: 0.95, opacity: 0 }, { y: 0, scale: 1, opacity: 1, duration: 0.5 }, start + 0.1);
    }

    const rule = scene.querySelector(".feat-rule");
    if (rule) {
      tl.fromTo(rule, { scaleX: 0, opacity: 1 }, { scaleX: 1, opacity: 1, duration: 0.4 }, start + 0.45);
    }

    const bullets = scene.querySelectorAll(".feat-bullet");
    bullets.forEach((b, i) => {
      tl.fromTo(b, { x: -40, opacity: 0 }, { x: 0, opacity: 1, duration: 0.4 }, start + 0.6 + i * 0.15);
    });
  }

  // ── CALLOUT ───────────────────────────────────────────────────────────
  function animateCallout(scene, tl, start) {
    const card = scene.querySelector(".callout-card");
    if (card) {
      tl.fromTo(card, { y: 50, scale: 0.92, opacity: 0 }, { y: 0, scale: 1, opacity: 1, duration: 0.55 }, start + 0.2);
    }
  }

  // ── OUTRO ─────────────────────────────────────────────────────────────
  function animateOutro(scene, tl, start, dur) {
    const cta = scene.querySelector(".out-cta-top");
    if (cta) {
      tl.fromTo(cta, { opacity: 0, y: -30 }, { opacity: 1, y: 0, duration: 0.45 }, start + 0.2);
    }

    const channel = scene.querySelector(".out-channel");
    if (channel) {
      tl.fromTo(channel, { scale: 0.6, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.55 }, start + 0.55);
    }

    const underline = scene.querySelector(".out-underline");
    if (underline) {
      tl.fromTo(underline, { width: 0 }, { width: "600px", duration: 0.5 }, start + 0.9);
    }

    const source = scene.querySelector(".out-source");
    if (source) {
      tl.fromTo(source, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4 }, start + 1.3);
    }

    // ── TikTok follow card animation (last ~3.5s of outro) ──────────────
    // Adapted from HyperFrames `tiktok-follow` block.
    // Card lives inside the outro scene (id="tt-card"); slide up + button click sequence.
    const ttCard = scene.querySelector("#tt-card");
    if (ttCard) {
      const ttBtn      = scene.querySelector("#tt-follow-btn");
      const ttFollow   = scene.querySelector("#tt-btn-follow");
      const ttFollwing = scene.querySelector("#tt-btn-following");
      const ttBase     = start + 1.6;  // start TikTok sequence 1.6s into outro

      // Slide in from bottom + fade in
      tl.fromTo(ttCard,
        { opacity: 0, y: 300 },
        { opacity: 1, y: 0, duration: 0.5 },
        ttBase
      );

      // Button press (scale down)
      if (ttBtn) {
        tl.to(ttBtn, { scale: 0.92, duration: 0.15 }, ttBase + 0.9);
        // Release with slight bounce (use scale up)
        tl.to(ttBtn, { scale: 1, duration: 0.4 }, ttBase + 1.05);
      }

      // Swap "Follow" → "Following" (opacity)
      if (ttFollow) {
        tl.to(ttFollow, { opacity: 0, duration: 0.08 }, ttBase + 1.05);
      }
      if (ttFollwing) {
        tl.to(ttFollwing, { opacity: 1, duration: 0.08 }, ttBase + 1.08);
      }

      // Hold + subtle zoom-in to focus viewer attention on the card.
      // Slow zoom from scale 1 → 1.08 over the remaining outro duration.
      const holdStart = ttBase + 1.3;             // after click animation
      const holdEnd   = start + dur - 0.1;        // ends just before scene ends
      const holdLen   = Math.max(0.5, holdEnd - holdStart);
      tl.to(ttCard, { scale: 1.08, duration: holdLen }, holdStart);
    }
  }
})();

</script>
